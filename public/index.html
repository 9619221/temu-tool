<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>💎 TEMU爆品 - 选品神器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding-bottom: 80px; }
    .card { background: rgba(255,255,255,0.95); border-radius: 12px; }
    .gradient-text { background: linear-gradient(90deg, #FF6B35, #F7931E); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* 底部导航 */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(26,26,46,0.95); backdrop-filter: blur(10px); padding: 8px 0; display: flex; justify-content: space-around; z-index: 100; border-top: 1px solid rgba(255,255,255,0.1); }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: #6B7280; font-size: 10px; padding: 4px 12px; }
    .nav-item.active { color: #FF6B35; }
    .nav-item span { font-size: 20px; margin-bottom: 2px; }
    
    /* 首页 */
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="text-gray-800">
  <!-- Header -->
  <header class="text-center py-4 px-4">
    <h1 class="text-2xl font-bold gradient-text">🔥 TEMU爆品</h1>
    <p class="text-gray-400 text-xs">跨境电商选品决策助手</p>
  </header>

  <!-- 页面内容 -->
  <div class="px-4">
    
    <!-- 首页 -->
    <div id="page-home" class="page active">
      <!-- 搜索 -->
      <div class="card p-4 mb-4">
        <input type="text" placeholder="🔍 搜索产品..." class="w-full p-3 border rounded-xl text-sm">
      </div>
      
      <!-- 快捷功能 -->
      <div class="grid grid-cols-4 gap-2 mb-4">
        <div class="card p-3 text-center" onclick="showPage('profit')">
          <div class="text-2xl">🧮</div>
          <div class="text-xs mt-1">利润计算</div>
        </div>
        <div class="card p-3 text-center" onclick="showPage('category')">
          <div class="text-2xl">📈</div>
          <div class="text-xs mt-1">热门品类</div>
        </div>
        <div class="card p-3 text-center" onclick="showPage('product')">
          <div class="text-2xl">🛍️</div>
          <div class="text-xs mt-1">热销产品</div>
        </div>
        <div class="card p-3 text-center" onclick="showPage('ai')">
          <div class="text-2xl">🤖</div>
          <div class="text-xs mt-1">AI生图</div>
        </div>
      </div>
      
      <!-- 推荐 -->
      <div class="card p-4">
        <h3 class="font-bold mb-3">💡 今日推荐</h3>
        <div class="space-y-2" id="recommendations"></div>
      </div>
    </div>

    <!-- 利润计算 -->
    <div id="page-profit" class="page">
      <div class="card p-4">
        <h2 class="font-bold mb-4">🧮 利润计算器</h2>
        <div class="space-y-3">
          <input type="number" id="p-price" placeholder="采购价 ¥" class="w-full p-3 border rounded-xl">
          <input type="number" id="p-ship" placeholder="物流费 ¥" class="w-full p-3 border rounded-xl">
          <input type="number" id="p-rate" placeholder="平台抽成 %" value="21" class="w-full p-3 border rounded-xl">
          <input type="number" id="p-return" placeholder="退货率 %" value="10" class="w-full p-3 border rounded-xl">
          <input type="number" id="p-usd" placeholder="美国售价 $" class="w-full p-3 border rounded-xl">
          <button onclick="calcProfit()" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">计算</button>
        </div>
        <div id="profit-result" class="mt-4 p-3 bg-gray-50 rounded-xl hidden"></div>
      </div>
    </div>

    <!-- 品类 -->
    <div id="page-category" class="page">
      <div class="card p-4">
        <h2 class="font-bold mb-3">📈 热门品类</h2>
        <div class="space-y-2" id="category-list"></div>
      </div>
    </div>

    <!-- 产品 -->
    <div id="page-product" class="page">
      <div class="card p-4">
        <h2 class="font-bold mb-3">🛍️ 热销产品</h2>
        <div class="grid grid-cols-2 gap-2" id="product-list"></div>
      </div>
    </div>

    <!-- AI生图 -->
    <div id="page-ai" class="page">
      <div class="card p-4">
        <h2 class="font-bold mb-3">🤖 AI 生图</h2>
        <textarea id="ai-prompt" placeholder="描述你想要的产品图..." class="w-full p-3 border rounded-xl h-24"></textarea>
        <button onclick="generateImage()" class="w-full bg-gradient-to-r from-orange-500 to-pink-500 text-white py-3 rounded-xl font-bold mt-3">生成图片</button>
        <div id="ai-result" class="mt-4 text-center"></div>
      </div>
    </div>

    <!-- TEMU全托管 -->
    <div id="page-temu" class="page">
      <div class="card p-4 mb-4">
        <h2 class="font-bold mb-3">📦 TEMU 全托管</h2>
        
        <h3 class="font-bold text-sm mt-4 mb-2">📝 入驻要求</h3>
        <div class="space-y-2" id="temu-requirements"></div>
        
        <h3 class="font-bold text-sm mt-4 mb-2">🚚 物流方案</h3>
        <div class="space-y-2" id="temu-logistics"></div>
        
        <h3 class="font-bold text-sm mt-4 mb-2">💰 费用计算</h3>
        <div class="space-y-2">
          <input type="number" id="t-cost" placeholder="产品成本 ¥" class="w-full p-2 border rounded-lg">
          <input type="number" id="t-weight" placeholder="重量 kg" class="w-full p-2 border rounded-lg">
          <select id="t-type" class="w-full p-2 border rounded-lg">
            <option value="false">国内发货</option>
            <option value="true">海外仓/全托管</option>
          </select>
          <button onclick="calcFullService()" class="w-full bg-orange-500 text-white py-2 rounded-lg font-bold">计算费用</button>
        </div>
        <div id="temu-cost-result" class="mt-3 p-2 bg-gray-50 rounded-lg hidden"></div>
      </div>
    </div>

  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage('home')">
      <span>🏠</span>
      首页
    </div>
    <div class="nav-item" onclick="showPage('profit')">
      <span>🧮</span>
      计算
    </div>
    <div class="nav-item" onclick="showPage('category')">
      <span>📈</span>
      品类
    </div>
    <div class="nav-item" onclick="showPage('product')">
      <span>🛍️</span>
      产品
    </div>
    <div class="nav-item" onclick="showPage('ai')">
      <span>🤖</span>
      AI
    </div>
    <div class="nav-item" onclick="showPage('temu')">
      <span>📦</span>
      全托管
    </div>
  </nav>

  <script>
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + id).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.closest('.nav-item').classList.add('active');
    }

    // 加载数据
    async function loadData() {
      try {
        const cats = await fetch('/api/categories').then(r => r.json());
        document.getElementById('category-list').innerHTML = cats.map(c => `
          <div class="flex justify-between p-2 bg-gray-50 rounded-lg">
            <span>${c.name}</span>
            <span class="text-green-500">${c.growth}</span>
          </div>
        `).join('');
        
        const prods = await fetch('/api/products').then(r => r.json());
        document.getElementById('product-list').innerHTML = prods.slice(0,6).map(p => `
          <div class="border rounded-lg p-2">
            <div class="bg-gray-100 h-20 rounded-lg flex items-center justify-center text-2xl">🛍️</div>
            <div class="text-xs mt-1 font-medium">${p.name}</div>
            <div class="text-orange-500 font-bold">$${p.price}</div>
          </div>
        `).join('');
        
        const recs = await fetch('/api/recommendations').then(r => r.json());
        document.getElementById('recommendations').innerHTML = recs.slice(0,3).map(r => `
          <div class="p-2 bg-orange-50 rounded-lg">
            <div class="font-bold text-sm">🔥 ${r.category}</div>
            <div class="text-xs text-gray-500">${r.tips}</div>
          </div>
        `).join('');
      } catch(e) { console.log(e); }
    }

    function calcProfit() {
      const price = parseFloat(document.getElementById('p-price').value) || 0;
      const ship = parseFloat(document.getElementById('p-ship').value) || 0;
      const rate = parseFloat(document.getElementById('p-rate').value) || 21;
      const ret = parseFloat(document.getElementById('p-return').value) || 10;
      const usd = parseFloat(document.getElementById('p-usd').value) || 0;
      
      const rmb = usd * 7.2;
      const income = rmb * (1 - rate/100);
      const cost = price + ship;
      const loss = rmb * (ret/100);
      const profit = income - cost - loss;
      const profitRate = ((profit/income)*100).toFixed(1);
      
      document.getElementById('profit-result').innerHTML = `
        <div class="text-center">
          <div class="text-2xl font-bold ${profit>0?'text-green-500':'text-red-500'}">¥${profit.toFixed(2)}</div>
          <div class="text-sm">利润率: ${profitRate}%</div>
        </div>
      `;
      document.getElementById('profit-result').classList.remove('hidden');
    }

    function generateImage() {
      const prompt = document.getElementById('ai-prompt').value;
      if(!prompt) return alert('请输入描述');
      
      document.getElementById('ai-result').innerHTML = '<div class="p-4 text-center">🤖 正在生成图片...</div>';
      
      fetch('/api/ai-image', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt: prompt})
      })
      .then(r => r.json())
      .then(data => {
        if(data.error) {
          document.getElementById('ai-result').innerHTML = '<div class="p-4 text-red-500">'+data.error+'</div>';
        } else {
          document.getElementById('ai-result').innerHTML = '<div class="p-4">✅ 已提交生成请求<br>ID: '+data.id+'</div>';
        }
      })
      .catch(e => {
        document.getElementById('ai-result').innerHTML = '<div class="p-4 text-red-500">生成失败</div>';
      });
    }

    loadData();
    loadTemuData();

    function loadTemuData() {
      fetch('/api/temu-requirements').then(r=>r.json()).then(data=>{
        document.getElementById('temu-requirements').innerHTML = data.map(d=>`
          <div class="flex justify-between p-2 bg-gray-50 rounded text-sm">
            <span>${d.required?'✅':'⚪'} ${d.item}</span>
            <span class="text-gray-500 text-xs">${d.note}</span>
          </div>
        `).join('');
      });
      fetch('/api/logistics').then(r=>r.json()).then(data=>{
        document.getElementById('temu-logistics').innerHTML = data.map(l=>`
          <div class="p-2 bg-blue-50 rounded text-sm">
            <div class="font-bold">${l.name} <span class="text-xs bg-blue-200 px-1 rounded">${l.type}</span></div>
            <div class="text-xs text-gray-600">时效: ${l.time} | 成本: ${l.cost}</div>
          </div>
        `).join('');
      });
    }

    function calcFullService() {
      const cost = parseFloat(document.getElementById('t-cost').value) || 0;
      const weight = parseFloat(document.getElementById('t-weight').value) || 0;
      const isOverseas = document.getElementById('t-type').value === 'true';
      
      fetch('/api/full-service-cost', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({productCost: cost, weight: weight, isOverseas: isOverseas})
      }).then(r=>r.json()).then(data=>{
        document.getElementById('temu-cost-result').innerHTML = `
          <div class="text-sm">
            <div class="flex justify-between"><span>产品成本:</span><span>¥${data.productCost}</span></div>
            <div class="flex justify-between"><span>物流费:</span><span>¥${data.freight}</span></div>
            <div class="flex justify-between"><span>服务费(15%):</span><span>¥${data.serviceFee}</span></div>
            <div class="flex justify-between"><span>平台抽成(21%):</span><span>¥${data.platformFee}</span></div>
            <div class="flex justify-between font-bold border-t mt-1 pt-1"><span>总成本:</span><span class="text-orange-500">¥${data.totalCost}</span></div>
          </div>
        `;
        document.getElementById('temu-cost-result').classList.remove('hidden');
      });
    }
  </script>
</body>
</html>
